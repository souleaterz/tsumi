appId: com.tsumi.desktop
productName: Tsumi
copyright: Tsumi

# Register the tsumi:// deep-link scheme so the website's "Open in app" button
# launches the installed desktop app.
protocols:
  - name: Tsumi
    schemes:
      - tsumi

# Two-package structure: the desktop shell has its OWN package.json
# (electron/package.json) declaring only its runtime dep — webtorrent. Pointing
# electron-builder at it (directories.app) means it bundles ONLY webtorrent's
# dependency tree, not the whole Next.js app, keeping the installer lean while
# still shipping the built-in torrent client. The root package.json stays the
# dev/build metadata (electron + electron-builder live there).
#
# webtorrent's native modules are all N-API (ABI-stable across Node/Electron),
# so their prebuilt .node binaries load in Electron as-is — no rebuild needed.
npmRebuild: false

directories:
  output: dist-app
  buildResources: electron/resources
  # App sources + the shell's package.json/node_modules live here.
  app: electron

# Paths below are relative to the app dir (electron/). node_modules production
# deps (webtorrent + tree) are collected automatically; native .node modules are
# auto-unpacked from the asar by electron-builder.
files:
  - '**/*'
  # mpv.exe ships via extraResources (below), so keep it out of the asar.
  - '!bin/**'
  - '!README.md'
  - '!package-lock.json'

# Ship mpv alongside the app. Drop the platform mpv binary into electron/bin/
# before building; it ends up at <resources>/mpv/ where mpv.js looks for it.
extraResources:
  - from: electron/bin
    to: mpv
    filter:
      - '**/*'

win:
  target: nsis
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

mac:
  target: dmg
  category: public.app-category.entertainment

linux:
  target: AppImage
  category: AudioVideo
